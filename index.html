<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Popularity Predictor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Spotify Popularity Predictor</h1>
        <p id="status">Training model...</p>

        <form id="predict-form">
            <div class="form-group">
                <label for="spotify_playlist_count">Spotify Playlist Count</label>
                <input type="number" id="spotify_playlist_count" value="500" min="0">
            </div>
            <div class="form-group">
                <label for="spotify_playlist_reach">Spotify Playlist Reach</label>
                <input type="number" id="spotify_playlist_reach" value="5000000" min="0">
            </div>
            <div class="form-group">
                <label for="youtube_views">YouTube Views</label>
                <input type="number" id="youtube_views" value="10000000" min="0">
            </div>
            <div class="form-group">
                <label for="youtube_likes">YouTube Likes</label>
                <input type="number" id="youtube_likes" value="100000" min="0">
            </div>
            <div class="form-group">
                <label for="tiktok_posts">TikTok Posts</label>
                <input type="number" id="tiktok_posts" value="5000" min="0">
            </div>
            <div class="form-group">
                <label for="apple_music_playlist_count">Apple Music Playlist Count</label>
                <input type="number" id="apple_music_playlist_count" value="50" min="0">
            </div>
            <div class="form-group">
                <label for="deezer_playlist_count">Deezer Playlist Count</label>
                <input type="number" id="deezer_playlist_count" value="30" min="0">
            </div>
            <div class="form-group">
                <label for="amazon_playlist_count">Amazon Playlist Count</label>
                <input type="number" id="amazon_playlist_count" value="20" min="0">
            </div>
            <div class="form-group">
                <label for="explicit_track">Explicit Track</label>
                <select id="explicit_track">
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>
            </div>

            <button type="submit" disabled>Predict</button>
        </form>

        <div id="result" class="hidden">
            <h2>Predicted Popularity</h2>
            <div id="prediction"></div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
